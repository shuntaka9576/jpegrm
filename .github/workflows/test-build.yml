name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o dist/jpegrm.exe .

      - name: Build installer
        run: iscc installer.iss

      - name: Install via installer
        run: .\dist\jpegrm-setup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
        shell: pwsh

      - name: Verify installation
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          jpegrm -h
        shell: pwsh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create test data
        run: |
          pip install pillow piexif
          python -c "
          from PIL import Image
          import piexif
          import os

          test_dir = os.path.join(os.environ['RUNNER_TEMP'], 'test-jpegrm')
          sub_dir = os.path.join(test_dir, 'sub')
          os.makedirs(sub_dir, exist_ok=True)

          def create_jpeg(directory, filename, date_str):
              img = Image.new('RGB', (100, 100), color='red')
              exif_dict = {'Exif': {piexif.ExifIFD.DateTimeOriginal: date_str.encode()}}
              exif_bytes = piexif.dump(exif_dict)
              path = os.path.join(directory, filename)
              img.save(path, 'JPEG', exif=exif_bytes)
              print(f'Created: {os.path.relpath(path, test_dir)} (EXIF: {date_str})')

          # Main directory files
          create_jpeg(test_dir, 'DSC1234.jpg', '2024:03:15 14:30:45')
          create_jpeg(test_dir, 'DSC5678.jpg', '2024:03:15 14:30:45')
          create_jpeg(test_dir, 'DSC9999.JPG', '2024:06:01 10:00:00')
          create_jpeg(test_dir, 'IMG_0001.jpg', '2024:12:25 09:00:00')
          create_jpeg(test_dir, 'IMG_0002.jpeg', '2025:01:01 00:00:00')
          create_jpeg(test_dir, 'photo.jpg', '2025:06:15 18:45:30')

          # No EXIF
          img = Image.new('RGB', (100, 100), color='blue')
          img.save(os.path.join(test_dir, 'no_exif.jpg'), 'JPEG')
          print('Created: no_exif.jpg (no EXIF)')

          # Subdirectory files
          create_jpeg(sub_dir, 'DSC0001.jpg', '2024:07:04 12:00:00')
          create_jpeg(sub_dir, 'IMG_0010.jpg', '2024:08:15 15:30:00')
          "
        shell: pwsh

      - name: "Test 1: Dry run (-n)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 1: Dry run ==="
          jpegrm -n $testDir
          echo ""
          echo "--- Files should be unchanged ---"
          Get-ChildItem $testDir -File | ForEach-Object { $_.Name } | Sort-Object
        shell: pwsh

      - name: "Test 2: Pattern - specific file (DSC1234)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 2: Pattern DSC1234 (single file) ==="
          jpegrm -n $testDir DSC1234
          echo ""
          echo "Expected: only DSC1234.jpg listed"
        shell: pwsh

      - name: "Test 3: Pattern - wildcard (DSC*)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 3: Pattern DSC* ==="
          jpegrm -n $testDir "DSC*"
          echo ""
          echo "Expected: DSC1234.jpg, DSC5678.jpg, DSC9999.JPG listed"
        shell: pwsh

      - name: "Test 4: Pattern - *.*"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 4: Pattern *.* (all files) ==="
          jpegrm -n $testDir "*.*"
          echo ""
          echo "Expected: all JPEG files listed (same as no pattern)"
        shell: pwsh

      - name: "Test 5: Verbose (-v) shows skipped files"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 5: Verbose ==="
          jpegrm -n -v $testDir
          echo ""
          echo "Expected: no_exif.jpg shown as SKIP"
        shell: pwsh

      - name: "Test 6: Rename specific pattern (DSC*)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 6: Rename DSC* only ==="
          jpegrm $testDir "DSC*"
          echo ""
          echo "--- Files after rename ---"
          Get-ChildItem $testDir -File | ForEach-Object { $_.Name } | Sort-Object
        shell: pwsh

      - name: "Verify Test 6: DSC* renamed, others unchanged"
        run: |
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          $files = (Get-ChildItem $testDir -File).Name | Sort-Object
          # DSC1234.jpg -> 2024_03_15_1430_00.jpg
          # DSC5678.jpg -> 2024_03_15_1430_01.jpg
          # DSC9999.JPG -> 2024_06_01_1000_00.jpg
          # IMG_0001.jpg, IMG_0002.jpeg, photo.jpg, no_exif.jpg should remain
          $expected = @("2024_03_15_1430_00.jpg", "2024_03_15_1430_01.jpg", "2024_06_01_1000_00.jpg", "IMG_0001.jpg", "IMG_0002.jpeg", "no_exif.jpg", "photo.jpg")
          echo "Expected: $($expected -join ', ')"
          echo "Actual:   $($files -join ', ')"
          if (Compare-Object $expected $files) {
            echo "FAIL: Test 6 verification failed!"
            exit 1
          } else {
            echo "PASS: DSC* renamed correctly, others untouched!"
          }
        shell: pwsh

      - name: "Test 7: Rename remaining files"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 7: Rename all remaining ==="
          jpegrm -v $testDir
          echo ""
          echo "--- Files after rename ---"
          Get-ChildItem $testDir -File | ForEach-Object { $_.Name } | Sort-Object
        shell: pwsh

      - name: "Verify Test 7: All renamed"
        run: |
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          $files = (Get-ChildItem $testDir -File).Name | Sort-Object
          $expected = @("2024_03_15_1430_00.jpg", "2024_03_15_1430_01.jpg", "2024_06_01_1000_00.jpg", "2024_12_25_0900_00.jpg", "2025_01_01_0000_00.jpg", "2025_06_15_1845_00.jpg", "no_exif.jpg")
          echo "Expected: $($expected -join ', ')"
          echo "Actual:   $($files -join ', ')"
          if (Compare-Object $expected $files) {
            echo "FAIL: Test 7 verification failed!"
            exit 1
          } else {
            echo "PASS: All files renamed correctly!"
          }
        shell: pwsh

      - name: "Test 8: Recursive (-r)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 8: Recursive ==="
          jpegrm -r -v $testDir
          echo ""
          echo "--- Sub directory files after rename ---"
          Get-ChildItem (Join-Path $testDir "sub") -File | ForEach-Object { $_.Name } | Sort-Object
        shell: pwsh

      - name: "Verify Test 8: Subdirectory files renamed"
        run: |
          $subDir = Join-Path $env:RUNNER_TEMP "test-jpegrm" "sub"
          $files = (Get-ChildItem $subDir -File).Name | Sort-Object
          $expected = @("2024_07_04_1200_00.jpg", "2024_08_15_1530_00.jpg")
          echo "Expected: $($expected -join ', ')"
          echo "Actual:   $($files -join ', ')"
          if (Compare-Object $expected $files) {
            echo "FAIL: Test 8 verification failed!"
            exit 1
          } else {
            echo "PASS: Recursive rename works correctly!"
          }
        shell: pwsh

      - name: "Test 9: Already renamed (should skip)"
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "User") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $testDir = Join-Path $env:RUNNER_TEMP "test-jpegrm"
          echo "=== Test 9: Already renamed files ==="
          jpegrm -v $testDir
          echo ""
          echo "Expected: 'No files to rename.' or all skipped"
        shell: pwsh
